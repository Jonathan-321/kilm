name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run tests
        run: make test

      - name: Run tokenizer analysis smoke
        run: make analyze

      - name: Run short training smoke
        run: |
          python3 scripts/run_track_a_sandbox.py \
            --tokenizer bpe \
            --bpe-vocab-size 64 \
            --max-steps 2 \
            --eval-interval 1 \
            --out-dir experiments/runs/ci_bpe_smoke
